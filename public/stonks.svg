<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#f3f4f6"/>

  <!-- Title -->
  <text x="300" y="38" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="18" fill="#000" letter-spacing="-0.5">BOYFRIEND POTENTIAL INDEX (BPI)</text>

  <!-- Y-axis label -->
  <text x="18" y="200" text-anchor="middle" font-family="monospace" font-size="11" fill="#9ca3af" transform="rotate(-90, 18, 200)">BPI SCORE</text>

  <!-- Grid lines (horizontal) -->
  <line x1="70" y1="70" x2="560" y2="70" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="140" x2="560" y2="140" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="210" x2="560" y2="210" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="70" y1="280" x2="560" y2="280" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Axes -->
  <line x1="70" y1="60" x2="70" y2="350" stroke="#000" stroke-width="2"/>
  <line x1="70" y1="350" x2="570" y2="350" stroke="#000" stroke-width="2"/>

  <!-- Y-axis labels -->
  <text x="60" y="75" text-anchor="end" font-family="monospace" font-size="10" fill="#6b7280">S-Tier</text>
  <text x="60" y="145" text-anchor="end" font-family="monospace" font-size="10" fill="#6b7280">A-Tier</text>
  <text x="60" y="215" text-anchor="end" font-family="monospace" font-size="10" fill="#6b7280">B-Tier</text>
  <text x="60" y="285" text-anchor="end" font-family="monospace" font-size="10" fill="#6b7280">C-Tier</text>
  <text x="60" y="355" text-anchor="end" font-family="monospace" font-size="10" fill="#6b7280">Meh</text>

  <!-- Area fill (gradient) -->
  <defs>
    <linearGradient id="greenFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.03"/>
    </linearGradient>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#16a34a"/>
    </marker>
  </defs>
  <polygon points="90,320 140,305 200,280 260,240 320,195 380,155 430,120 480,95 530,78 555,72 555,350 90,350" fill="url(#greenFade)"/>

  <!-- The rising line -->
  <polyline points="90,320 140,305 200,280 260,240 320,195 380,155 430,120 480,95 530,78 555,72"
    fill="none" stroke="#16a34a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="90" cy="320" r="4" fill="#16a34a"/>
  <circle cx="140" cy="305" r="4" fill="#16a34a"/>
  <circle cx="200" cy="280" r="4" fill="#16a34a"/>
  <circle cx="260" cy="240" r="4" fill="#16a34a"/>
  <circle cx="320" cy="195" r="4" fill="#16a34a"/>
  <circle cx="380" cy="155" r="4" fill="#16a34a"/>
  <circle cx="430" cy="120" r="4" fill="#16a34a"/>
  <circle cx="480" cy="95" r="4" fill="#16a34a"/>
  <circle cx="530" cy="78" r="5" fill="#16a34a"/>
  <circle cx="555" cy="72" r="6" fill="#16a34a" stroke="#fff" stroke-width="2"/>

  <!-- X-axis labels -->
  <text x="90" y="372" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280">2018</text>
  <text x="200" y="372" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280">2020</text>
  <text x="320" y="372" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280">2022</text>
  <text x="430" y="372" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280">2024</text>
  <text x="540" y="372" text-anchor="middle" font-family="monospace" font-size="10" fill="#6b7280">NOW</text>

  <!-- X-axis label -->
  <text x="310" y="395" text-anchor="middle" font-family="monospace" font-size="11" fill="#9ca3af">CHARACTER DEVELOPMENT ARC</text>

  <!-- Fun annotations -->

  <!-- Milestone markers -->
  <rect x="240" y="225" width="90" height="20" rx="3" fill="#000" opacity="0.85"/>
  <text x="285" y="239" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff">GLOW UP ERA</text>

  <rect x="460" y="62" width="85" height="20" rx="3" fill="#dc2626"/>
  <text x="502" y="76" text-anchor="middle" font-family="monospace" font-size="9" fill="#fff" font-weight="bold">PEAK FORM</text>
</svg>
